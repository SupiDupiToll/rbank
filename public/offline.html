<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1115" />
  <title>Offline – RBANK</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1115;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e2e8f0;
      padding: 2rem;
    }
    .container { text-align: center; max-width: 24rem; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 2rem; margin-bottom: 0.75rem; color: #f1f5f9; font-family: Georgia, serif; }
    p { color: #94a3b8; font-size: 1.125rem; line-height: 1.6; }
    button {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #b7e44b;
      color: #0f1115;
      border: none;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Offline</h1>
    <p>Keine Internetverbindung — Daten werden nach der Verbindung aktualisiert.</p>
    <button onclick="window.location.reload()">Erneut versuchen</button>
  </div>
</body>
</html>
